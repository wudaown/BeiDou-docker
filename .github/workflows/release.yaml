name: BeiDou Release Workflow

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "no prefix release version"
        required: true
        type: string

    
env:
  GHCR_REGISTRY: ghcr.io
  RELEASE_IMAGE: beidou-server-all

jobs:
  Backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      # attestations: write
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare environment for current platform
        id: prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Prepare release arch
        run: |
          if [[ "${{ matrix.platform }}" == "linux/amd64" ]]; then
            echo "RELEASE_ARCH=x64" >> $GITHUB_ENV
          elif [[ "${{ matrix.platform }}" == "linux/arm64" ]]; then
            echo "RELEASE_ARCH=arm64" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Log in to the Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-release
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}
            ${{ env.GHCR_REGISTRY }}/${{ env.OWNER_LC }}/${{ env.RELEASE_IMAGE }}
          cache-from: type=gha,scope=release-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            RELEASE_VERSION=${{ inputs.release_version }}
            RELEASE_ARCH=${{ env.RELEASE_ARCH }}
            GITHUB_OWNER=wudaown

      - name: Export Digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-release-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  Backend-merge-digest:
    runs-on: ubuntu-latest
    needs: Backend
    permissions:
        contents: read
        packages: write
        id-token: write
        # attestations: write
    steps:
      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-release-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and pushs
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:v${{ inputs.release_version }}" \
            -t "${{ env.GHCR_REGISTRY }}/${{ env.OWNER_LC }}/${{ env.RELEASE_IMAGE }}:v${{ inputs.release_version }}" \
            $(printf '${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}@sha256:%s ' *)


