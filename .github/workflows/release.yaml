name: BeiDou Release Workflow

on:
  workflow_dispatch:
    
env:
  RELEASE_IMAGE: beidou-server-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout docker repo
        uses: actions/checkout@v4

      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          repository: wudaown/BeiDou-Server
          path: BeiDou-Server
          sparse-checkout: |
            pom.xml
            gms-server
            gms-ui
            gms-server/pom.xml
            gms-server/src
            gms-ui/package.json
            gms-ui/pnpm-lock.yaml
            gms-ui/yarn.lock
            gms-ui/src
            gms-ui/config
            gms-ui/index.html
            gms-ui/vite.config*.ts
            gms-ui/tsconfig.json
            gms-ui/.env*
            gms-ui/babel.config.js
            gms-ui/postcss.config.js
            gms-ui/tailwind.config.js
            gms-ui/.eslintrc.js
            gms-ui/.prettierrc.js
            gms-ui/.stylelintrc.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Prepare context
        run: |
          cp -r BeiDou-Server/* ./
          rm -rf BeiDou-Server

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile-local
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:latest
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:$(date +%Y%m%d)
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
