name: BeiDou Release Workflow

on:
  workflow_dispatch:
    
env:
  RELEASE_IMAGE: beidou-server-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout docker repo
        uses: actions/checkout@v4

      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          repository: wudaown/BeiDou-Server
          path: BeiDou-Server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Prepare context
        run: |
          cp -r BeiDou-Server/* ./
          rm -rf BeiDou-Server

      - name: Get date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile-local
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:latest
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/${{ env.RELEASE_IMAGE }}:${{ steps.date.outputs.date }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
